trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/*
      - package.json
      - tsconfig.json
      - vitest.config.ts

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/*
      - package.json
      - tsconfig.json
      - vitest.config.ts

variables:
  nodeVersion: '22.x'
  azureSubscription: 'DentalImageAnalysis-ServiceConnection'
  webAppName: 'dental-image-api'

stages:
  # ── CI: Build & Test ─────────────────────────────────────────────────────
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: Test
        displayName: Lint, Type Check & Test
        pool:
          vmImage: ubuntu-latest
        strategy:
          matrix:
            Node20:
              nodeVer: '20.x'
            Node22:
              nodeVer: '22.x'
        steps:
          - task: NodeTool@0
            displayName: Use Node.js $(nodeVer)
            inputs:
              versionSpec: $(nodeVer)

          - script: npm ci
            displayName: Install dependencies

          - script: npx tsc --noEmit
            displayName: Type check

          - script: npm test
            displayName: Run tests

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/test-results.xml'
              mergeTestResults: true
            continueOnError: true

      - job: BuildArtifact
        displayName: Build & Publish Artifact
        dependsOn: Test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run build
            displayName: Build TypeScript

          - script: npm ci --omit=dev
            displayName: Install production dependencies only

          - task: CopyFiles@2
            displayName: Stage files for artifact
            inputs:
              sourceFolder: $(Build.SourcesDirectory)
              contents: |
                dist/**
                package.json
                package-lock.json
                node_modules/**
                public/**
              targetFolder: $(Build.ArtifactStagingDirectory)

          - publish: $(Build.ArtifactStagingDirectory)
            displayName: Publish pipeline artifact
            artifact: dental-api

  # ── CD: Deploy to Azure App Service ──────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to Azure
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWeb
        displayName: Deploy to App Service
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: dental-api

                - task: AzureWebApp@1
                  displayName: Deploy to Azure Web App
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appType: webAppLinux
                    appName: $(webAppName)
                    package: $(Pipeline.Workspace)/dental-api
                    runtimeStack: NODE|22-lts
                    startUpCommand: 'node dist/index.js'
                    appSettings: |
                      -PORT 8080
                      -NODE_ENV production
