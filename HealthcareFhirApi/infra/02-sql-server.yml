# Step 2: Create Azure SQL Server and Database
# Run each command in order

name: Azure SQL Server Setup
description: Creates SQL Server, database, and firewall rules

commands:
  # Create SQL Server
  - az sql server create
      --resource-group fhir-api-rg
      --name fhirapi-sql
      --location eastus
      --admin-user fhiradmin
      --admin-password "<YOUR_SQL_PASSWORD>"
      --minimal-tls-version 1.2

  # Create SQL Database (Standard S1 tier)
  - az sql db create
      --resource-group fhir-api-rg
      --server fhirapi-sql
      --name FhirDb
      --service-objective S1
      --collation SQL_Latin1_General_CP1_CI_AS
      --max-size 250GB

  # Allow Azure services to access SQL Server
  - az sql server firewall-rule create
      --resource-group fhir-api-rg
      --server fhirapi-sql
      --name AllowAzureServices
      --start-ip-address 0.0.0.0
      --end-ip-address 0.0.0.0

  # Allow your local IP (replace with your IP)
  - az sql server firewall-rule create
      --resource-group fhir-api-rg
      --server fhirapi-sql
      --name AllowMyIP
      --start-ip-address <YOUR_IP>
      --end-ip-address <YOUR_IP>
