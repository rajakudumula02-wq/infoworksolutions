trigger:
  branches:
    include:
      - main
  paths:
    include:
      - MemberSmsCampaign/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - MemberSmsCampaign/**

variables:
  dotnetVersion: '10.0.x'
  buildConfiguration: 'Release'
  azureSubscription: 'MemberSmsCampaign-ServiceConnection'
  webAppName: 'member-sms-campaign-api'
  workingDirectory: 'MemberSmsCampaign'

stages:
  # ── CI: Build & Test ─────────────────────────────────────────────────────
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildAndTest
        displayName: Restore, Build, Test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET $(dotnetVersion)
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          - script: dotnet restore MemberSmsCampaign.sln
            displayName: Restore dependencies
            workingDirectory: $(workingDirectory)

          - script: dotnet build MemberSmsCampaign.sln --no-restore -c $(buildConfiguration)
            displayName: Build solution
            workingDirectory: $(workingDirectory)

          - script: dotnet test tests/MemberSmsCampaign.UnitTests/MemberSmsCampaign.UnitTests.csproj --no-build -c $(buildConfiguration) --logger trx --results-directory $(Agent.TempDirectory)/TestResults
            displayName: Run unit tests
            workingDirectory: $(workingDirectory)

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/*.trx'
              mergeTestResults: true

          - script: dotnet publish src/MemberSmsCampaign.Api/MemberSmsCampaign.Api.csproj -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/publish --no-build
            displayName: Publish API project
            workingDirectory: $(workingDirectory)

          - publish: $(Build.ArtifactStagingDirectory)/publish
            displayName: Publish pipeline artifact
            artifact: sms-campaign-api

  # ── CD: Deploy to Azure App Service ──────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to Azure
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWeb
        displayName: Deploy to App Service
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: sms-campaign-api

                - task: AzureWebApp@1
                  displayName: Deploy to Azure Web App
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appType: webAppLinux
                    appName: $(webAppName)
                    package: $(Pipeline.Workspace)/sms-campaign-api
                    runtimeStack: DOTNETCORE|10.0
